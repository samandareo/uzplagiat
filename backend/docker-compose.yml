version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: uzplagiat_auth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d uzplagiat_auth"]
      interval: 5s
      timeout: 5s
      retries: 10

  mongo:
    image: mongo:6.0
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/uzplagiat_auth
      - MONGO_URL=mongodb://admin:password@mongo:27017
      - SECRET_KEY=your-super-secret-key-change-in-production
      - MODEL_PATH=/app/uzbek-plagiarism-model
      - FAISS_INDEX_PATH=/app/plagiarism_db.index
      - TEXTS_CSV_PATH=/app/plagiarism_db_texts.csv
    volumes:
      - ./src:/app/src
      # Mount ML assets from the host. Make sure these exist locally.
      - ./uzbek-plagiarism-model:/app/uzbek-plagiarism-model:ro
      - ./plagiarism_db.index:/app/plagiarism_db.index:ro
      - ./plagiarism_db_texts.csv:/app/plagiarism_db_texts.csv:ro
    depends_on:
      db:
        condition: service_healthy
      mongo:
        condition: service_healthy

volumes:
  postgres_data:
  mongo_data:
